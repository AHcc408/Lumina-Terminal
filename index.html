<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              terminal: {
                bg: 'var(--color-bg)',
                panel: 'var(--color-panel)',
                header: 'var(--color-header)', // New for Card headers
                border: 'var(--color-border)',
                accent: 'var(--color-accent)',
                up: 'var(--color-up)',
                down: 'var(--color-down)',
                text: 'var(--color-text)',
                muted: 'var(--color-muted)'
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Light Mode Defaults */
        --color-bg: #f3f4f6;
        --color-panel: #ffffff;
        --color-header: #f9fafb;
        --color-border: #e5e7eb;
        --color-text: #1f2937;
        --color-muted: #6b7280;
        --color-accent: #2563eb; /* Blue-600 */
        --color-up: #16a34a; /* Green-600 */
        --color-down: #dc2626; /* Red-600 */
      }

      .dark {
        /* Dark Mode Overrides */
        --color-bg: #0a0a0a;
        --color-panel: #111111;
        --color-header: #1a1a1a;
        --color-border: #2a2a2a;
        --color-text: #e5e5e5;
        --color-muted: #737373;
        --color-accent: #00f0ff; /* Cyan */
        --color-up: #00ff41; /* Terminal Green */
        --color-down: #ff1a1a; /* Bright Red */
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-text);
      }
      /* Only lock overflow on desktop to allow mobile scrolling */
      @media (min-width: 1024px) {
        body {
          overflow: hidden;
        }
      }
      /* Custom scrollbar for panels */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-panel);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-muted);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
